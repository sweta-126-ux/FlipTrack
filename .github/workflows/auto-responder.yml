name: Auto-Responder Bot

on:
  issue_comment:
    types: [created]

jobs:
  auto-respond:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Respond to assignment requests
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment;
            const issue = context.payload.issue;
            const repoOwner = context.repo.owner;
            const commenter = comment.user.login;

            // 1. Ignore comments on Pull Requests
            if (issue.pull_request) {
              console.log('Comment is on a PR, skipping.');
              return;
            }

            // 2. Ignore comments from Bots
            if (comment.user.type === 'Bot') {
              console.log('Comment is from a Bot, skipping.');
              return;
            }

            // 3. Ignore comments from the repository owner/maintainer
            if (commenter === repoOwner) {
              console.log('Comment is from the maintainer, skipping.');
              return;
            }

            // 4. Check for keywords
            const bodyLower = comment.body.toLowerCase();
            const keywords = ['assign', 'work on this', 'can i take', 'gssoc', 'ecsoc'];
            const hasKeyword = keywords.some(keyword => bodyLower.includes(keyword));

            if (!hasKeyword) {
              console.log('No assignment keywords found, skipping.');
              return;
            }

            // 5. Check if the bot has already replied to this issue
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });

            // Look for a comment from github-actions[bot] that contains our signature message
            const botSignature = 'Thank you for your interest in contributing';
            const hasReplied = comments.data.some(c => 
              c.user.login === 'github-actions[bot]' && c.body.includes(botSignature)
            );

            if (hasReplied) {
              console.log('Bot has already replied to this issue, skipping to prevent spam.');
              return;
            }

            // 6. Check if the user already has open assigned issues/PRs
            const assignedItemsResponse = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              assignee: commenter,
              state: 'open'
            });

            // Filter out the current issue they are commenting on (just in case)
            const activeAssignments = assignedItemsResponse.data.filter(item => item.number !== issue.number);
            const hasOpenAssignments = activeAssignments.length > 0;

            let replyBody = '';

            if (hasOpenAssignments) {
              const assignedItem = activeAssignments[0];
              replyBody = `Hi @${commenter}! 👋\n\nWe love the enthusiasm! However, to keep things fair and manageable, our policy is that contributors may only take on **one active issue at a time**.\n\nIt looks like you currently have unfinished work ([#${assignedItem.number}](${assignedItem.html_url})). Please focus on completing that one first!\n\nOnce your current work is merged, if this issue is still open, you are more than welcome to claim it. Happy coding! 🚀`;
            } else {
              replyBody = `Hi @${commenter}! 👋\n\n${botSignature} to this repository! Please wait until a maintainer officially assigns you to this issue before opening a Pull Request. \n\nWhile you wait, please consider starring ⭐ this repository to show your support! We review requests regularly and will assign it as soon as possible if it's available. Happy coding! 🚀`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: replyBody
            });
            console.log('Successfully posted auto-response.');
