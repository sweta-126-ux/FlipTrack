name: Typecheck & Build

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  check:
    name: Typecheck and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript Checker
        run: npm run typecheck

      - name: Verify Build
        run: npm run build
